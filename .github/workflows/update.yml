name: Mime-inator

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mime-inator-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mime-inator-

      - name: Run the Mime-inator
        run: cargo run -p mime-inator

      - name: Read summary
        id: summary
        run: |
          echo "changed=$(jq -r '.changed' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "iana_date=$(jq -r '.iana_date' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "entry_count=$(jq -r '.entry_count' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "version_current=$(jq -r '.version_current // empty' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "version_new=$(jq -r '.version_new // empty' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "added_count=$(jq '.added | length' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"
          echo "removed_count=$(jq '.removed | length' mime-inator-summary.json)" >> "$GITHUB_OUTPUT"

      - name: Format check
        if: steps.summary.outputs.changed == 'true'
        run: cargo fmt --check --all

      - name: Clippy (std)
        if: steps.summary.outputs.changed == 'true'
        run: cargo clippy -p libmime -- -D warnings

      - name: Clippy (no_std)
        if: steps.summary.outputs.changed == 'true'
        run: cargo clippy -p libmime --no-default-features -- -D warnings

      - name: Test (std)
        if: steps.summary.outputs.changed == 'true'
        run: cargo test -p libmime

      - name: Test (no_std)
        if: steps.summary.outputs.changed == 'true'
        run: cargo test -p libmime --no-default-features

      - name: Commit and tag
        if: steps.summary.outputs.changed == 'true'
        run: |
          git config user.name "mime-inator[bot]"
          git config user.email "mime-inator[bot]@users.noreply.github.com"

          git add \
            libmime/src/generated.rs \
            libmime/src/generated_map.rs \
            libmime/src/generated_phf.rs \
            libmime/Cargo.toml

          git commit -m "chore: update MIME types from IANA registry

          Version: ${{ steps.summary.outputs.version_current }} -> ${{ steps.summary.outputs.version_new }}
          IANA last updated: ${{ steps.summary.outputs.iana_date }}
          Types: ${{ steps.summary.outputs.entry_count }}
          Added: ${{ steps.summary.outputs.added_count }}
          Removed: ${{ steps.summary.outputs.removed_count }}
          Triggered by: ${{ github.event_name }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git tag "v${{ steps.summary.outputs.version_new }}"

      - name: Push
        if: steps.summary.outputs.changed == 'true'
        run: git push --follow-tags

      - name: Build release notes
        if: steps.summary.outputs.changed == 'true'
        id: notes
        run: |
          ADDED=$(jq -r '.added[]' mime-inator-summary.json || true)
          REMOVED=$(jq -r '.removed[]' mime-inator-summary.json || true)

          {
            echo "body<<EOF"
            echo "## libmime v${{ steps.summary.outputs.version_new }}"
            echo ""
            echo "IANA registry last updated: ${{ steps.summary.outputs.iana_date }}"
            echo "Total types: ${{ steps.summary.outputs.entry_count }}"
            echo ""

            if [ "${{ steps.summary.outputs.added_count }}" -gt 0 ]; then
              echo "### Added (${{ steps.summary.outputs.added_count }})"
              echo ""
              echo '```'
              echo "$ADDED"
              echo '```'
              echo ""
            fi

            if [ "${{ steps.summary.outputs.removed_count }}" -gt 0 ]; then
              echo "### Removed (${{ steps.summary.outputs.removed_count }})"
              echo ""
              echo '```'
              echo "$REMOVED"
              echo '```'
              echo ""
            fi

            echo "---"
            echo "[Workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.summary.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.summary.outputs.version_new }}" \
            --title "v${{ steps.summary.outputs.version_new }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --draft

      - name: Publish to crates.io
        if: steps.summary.outputs.changed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p libmime

      - name: Summary
        if: always()
        run: |
          {
            echo "## Mime-inator Run Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Changes | \`${{ steps.summary.outputs.changed }}\` |"
            echo "| IANA date | \`${{ steps.summary.outputs.iana_date }}\` |"
            echo "| Total types | ${{ steps.summary.outputs.entry_count }} |"
            if [ "${{ steps.summary.outputs.changed }}" = "true" ]; then
              echo "| Version | \`${{ steps.summary.outputs.version_current }}\` -> \`${{ steps.summary.outputs.version_new }}\` |"
              echo "| Added | ${{ steps.summary.outputs.added_count }} |"
              echo "| Removed | ${{ steps.summary.outputs.removed_count }} |"
              echo "| Release | [v${{ steps.summary.outputs.version_new }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.summary.outputs.version_new }}) (draft) |"
              echo "| Published | yes |"
            else
              echo "| Version | unchanged |"
              echo "| Published | skipped |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"