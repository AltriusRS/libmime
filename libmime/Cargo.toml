[package]
name = "libmime"
version = "1.0.20260327"
edition = "2021"
rust-version = "1.66"
description = "Auto-generated IANA media type constants for Rust"
license = "MIT"
readme = "../README.md"
repository = "https://github.com/AltriusRS/libmime"

[features]
default = ["std"]
std = ["phf"]

[dependencies]
phf = {version = "0.13.1", features = ["std"], optional=true}
